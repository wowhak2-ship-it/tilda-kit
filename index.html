<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Tilda Kit — конструктор кода для Tilda</title>
<link rel="stylesheet" href="css/panel.css">
</head>
<body>
<aside class="sidebar">
  <div class="logo">Tilda&nbsp;<span>Kit</span></div>
  <nav id="nav"></nav>
</aside>
<main class="settings">
  <h1 id="tool-title">Выбери инструмент</h1>
  <p id="tool-desc" class="desc"></p>
  <div id="controls"></div>
  <section class="presets">
    <h2>Пресеты</h2>
    <div class="preset-row">
      <input id="preset-name" type="text" placeholder="Имя пресета">
      <button id="preset-save">Сохранить</button>
    </div>
    <div id="preset-list"></div>
  </section>
</main>
<section class="output">
  <h2>Превью</h2>
  <iframe id="preview" title="Превью"></iframe>
  <div class="hint" id="insert-hint"></div>
  <h2>Код для Tilda</h2>
  <pre id="code"></pre>
  <button id="copy-btn" class="copy">Скопировать код</button>
</section>
<script type="module" src="js/app.js"></script>
</body>
</html>
